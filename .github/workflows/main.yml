name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  progress-provider-compatibility:
    name: Progress provider (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: "0.11.28"

      - name: Exercise the package-owned provider
        shell: bash
        run: |
          uv lock --check
          uv run --frozen pytest -q test/unit/core/test_lammps_progress.py

  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: "0.11.28"

      - name: Install system dependencies
        run: bash ci/install_deps.sh

      - name: Install Jarvis
        run: bash ci/install_jarvis.sh

      - name: Type-check runtime contracts
        run: |
          uv run --frozen pyright \
            jarvis_cd/artifacts \
            jarvis_cd/core/execution.py \
            jarvis_cd/core/scheduler.py \
            jarvis_cd/progress \
            ci/live_ares_gray_scott_probe.py \
            builtin/builtin/lammps/artifacts.py \
            builtin/builtin/paraview/artifacts.py \
            builtin/builtin/gray_scott/progress.py \
            builtin/builtin/gray_scott/artifacts.py \
            builtin/builtin/adios2_gray_scott/progress.py \
            builtin/builtin/adios2_gray_scott/artifacts.py

      - name: Lint runtime contracts
        run: |
          uv run --frozen ruff check \
            jarvis_cd/artifacts \
            jarvis_cd/core/execution.py \
            jarvis_cd/core/pipeline.py \
            jarvis_cd/core/pkg.py \
            jarvis_cd/core/cli.py \
            jarvis_cd/core/scheduler.py \
            jarvis_cd/progress \
            ci/live_ares_gray_scott_probe.py \
            builtin/builtin/lammps/artifacts.py \
            builtin/builtin/paraview/artifacts.py \
            builtin/builtin/gray_scott \
            builtin/builtin/adios2_gray_scott
          uv run --frozen ruff format --check \
            jarvis_cd/artifacts \
            jarvis_cd/core/scheduler.py \
            jarvis_cd/progress \
            ci/live_ares_gray_scott_probe.py \
            builtin/builtin/lammps/artifacts.py \
            builtin/builtin/paraview/artifacts.py \
            builtin/builtin/gray_scott/progress.py \
            builtin/builtin/gray_scott/artifacts.py \
            builtin/builtin/adios2_gray_scott/progress.py \
            builtin/builtin/adios2_gray_scott/artifacts.py

      - name: Run tests with coverage
        run: bash ci/run_tests.sh

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false
