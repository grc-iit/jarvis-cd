# Pipeline: Nyx Container Test on Ares (CPU-only)
# Purpose: Run Nyx cosmological simulation inside Docker containers on Ares
# Hosts: ares-comp-25, ares-comp-27, ares-comp-28

name: nyx_ares_container_test

container_engine: docker
container_base: ubuntu:24.04

hostfile: /home/llogan/hostfile.txt

container_env:
  OMPI_MCA_btl_tcp_if_include: eno1
  OMPI_MCA_oob_tcp_if_include: eno1

pkgs:
  - pkg_type: builtin.nyx
    pkg_name: nyx_ares
    deploy_mode: container
    nprocs: 3
    ppn: 1
    max_step: 10
    n_cell: "64 64 64"
    max_level: 0
    out: /tmp/nyx_out
    plot_int: 5
    base_image: ubuntu:24.04
