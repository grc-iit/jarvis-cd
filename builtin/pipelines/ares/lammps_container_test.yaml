# Pipeline: LAMMPS Container Test on Ares (CPU-only)
# Purpose: Run LAMMPS molecular dynamics simulation inside Docker containers on Ares
# Hosts: ares-comp-25, ares-comp-27, ares-comp-28

name: lammps_ares_container_test
install_manager: container

container_engine: docker
container_base: ubuntu:24.04

hostfile: /home/llogan/hostfile.txt

container_env:
  OMPI_MCA_btl_tcp_if_include: eno1
  OMPI_MCA_oob_tcp_if_include: eno1

pkgs:
  - pkg_type: builtin.lammps
    pkg_name: lammps_ares
    nprocs: 3
    ppn: 1
    kokkos_gpu: false
    script: /opt/lammps/bench/in.lj
    out: /tmp/lammps_out
    base_image: ubuntu:24.04
