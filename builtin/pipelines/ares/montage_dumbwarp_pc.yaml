# Montage on dumbwarp, 4 nodes, with the producer-consumer-restored
# run_mosaic.sh bound over the SIF's baked copy. Every stage's
# intermediate (*.tbl + projected/*.fits + diffs/*.fits +
# corrected/*.fits + mosaic.fits) lands directly on the dumbwarp FUSE
# mount so each stage's outputs are reads for the next stage from
# dumbwarp's perspective.
#
# The dumbwarp daemon dumps three reports per node into
# /tmp/dumbwarp_{iostats,pc,files}.csv during the run, and the
# jarvis_dumbwarp.dumbwarp package archives them into
# ${shared_dir}/reports/ at pipeline stop. `scripts/analyze.sh` then
# summarizes read/write counts across nodes.

name: montage_dumbwarp_pc

install_manager: container
container_engine: apptainer
container_image: montage_apptainer_test

container_binds:
  - /mnt/common/llogan/jarvis-cd/builtin/builtin/montage/run_mosaic.sh:/opt/run_mosaic.sh:ro
  - ${HOME}/dumbwarp_montage_4n:${HOME}/dumbwarp_montage_4n
  - ${HOME}/dumbwarp_montage_4n:/mnt/dumbwarp

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"
pssh_cmd: "env -u LD_LIBRARY_PATH ssh"
mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"

scheduler:
  name: slurm
  job_name: montage_dumbwarp_pc
  nodes: 4
  ntasks_per_node: 24
  mem: 20G
  partition: compute
  time: "00:25:00"
  output: slurm-%j.out
  error: slurm-%j.err
  suffix: "-40g"
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    - 'for n in $(scontrol show hostnames "$SLURM_JOB_NODELIST"); do env -u LD_LIBRARY_PATH ssh -o BatchMode=yes -o StrictHostKeyChecking=no "$n" "pkill -9 dumbwarpd 2>/dev/null; fusermount3 -u /home/llogan/dumbwarp_montage_4n 2>/dev/null; umount -l /home/llogan/dumbwarp_montage_4n 2>/dev/null; rm -rf /dev/shm/montage-scratch-* 2>/dev/null; rm -f /tmp/dumbwarp_*.csv /tmp/dumbwarp_*.log 2>/dev/null; mkdir -p /home/llogan/dumbwarp_montage_4n; true" & done; wait'

pkgs:
  - pkg_type: jarvis_dumbwarp.dumbwarp
    pkg_name: dumbwarp
    deploy_mode: default
    mountpoint: ${HOME}/dumbwarp_montage_4n
    bin_dir: /mnt/common/llogan/dumbwarp/build
    bind_addr: enp47s0np0
    port: 18123
    thallium_proto: "ofi+tcp;ofi_rxm"
    page_size: 65536
    consumer_ttl: 120
    compress: none
    sleep: 4

  - pkg_type: builtin.montage
    pkg_name: montage
    nprocs: 4
    ppn: 1
    region: M17
    band: j
    mosaic_replicates: 40
    parallel_reps: 2
    omp_threads: 4
    out: /mnt/dumbwarp/montage
