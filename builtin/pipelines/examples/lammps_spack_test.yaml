# Pipeline: LAMMPS Spack Test
# Purpose: Test LAMMPS deployment using spack package manager
# Requirements: Spack installed and in PATH (or SPACK_ROOT set)

name: lammps_spack_test
base_deploy_mode: spack

pkgs:
  - pkg_type: builtin.lammps
    pkg_name: lammps_spack
    install_method: spack
    install_query: lammps
    nprocs: 4
    ppn: 4
    script: /opt/lammps/bench/in.lj
    out: /tmp/lammps_spack_out
