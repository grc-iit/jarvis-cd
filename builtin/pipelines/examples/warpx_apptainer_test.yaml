# Pipeline: WarpX Apptainer Test
# Purpose: Test WarpX PIC simulation using Apptainer
# Requirements: NVIDIA GPU, sci-hpc-base image built locally

name: warpx_apptainer_test
install_manager: container

container_engine: apptainer
container_base: sci-hpc-base

pkgs:
  - pkg_type: builtin.hdf5
    pkg_name: hdf5
  - pkg_type: builtin.warpx
    pkg_name: warpx_apptainer
    nprocs: 2
    ppn: 2
    cuda_arch: 80
    base_image: sci-hpc-base
    example: laser_acceleration
    max_step: 50
    n_cell: 64 64 128
    out: /tmp/warpx_out
    plot_int: 10
