# Pipeline: IOR Apptainer Test
# Purpose: Test IOR deployment using Apptainer (for HPC clusters without root)
# Requirements: Docker or Podman (for building), Apptainer (for running)
#
# Build phase:  jarvis-build-ior image — installs IOR via Spack (cached)
# Deploy phase: ior_apptainer_test.sif — copies binaries, converted from Docker image

name: ior_apptainer_test

container_engine: apptainer
container_base: iowarp/iowarp-build:latest

pkgs:
  - pkg_type: builtin.ior
    pkg_name: ior_apptainer
    deploy_mode: container
    nprocs: 4
    ppn: 4
    block: 1G
    xfer: 1M
    api: posix
    out: /tmp/ior_test_file
    log: /tmp/ior_output.log
    write: true
    read: true
    fpp: false
    reps: 1
    direct: false
