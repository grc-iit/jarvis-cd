# Pipeline: IOR Apptainer Test
# Purpose: Test IOR deployment using Apptainer (for HPC clusters without root)
# Requirements: Docker or Podman (for building), Apptainer (for running)
#
# Build phase:  jarvis-build-ior image — builds IOR from source with OpenMPI (cached)
# Deploy phase: ior_apptainer_test.sif — copies ior binary, converted from Docker image

name: ior_apptainer_test
base_deploy_mode: container

container_engine: apptainer
container_base: ubuntu:24.04

pkgs:
  # HDF5 + ADIOS2 must precede IOR: they deposit libhdf5*.so* and
  # libadios2*.so* into the build container's /usr/local/lib so IOR's
  # Dockerfile.deploy COPY of those globs finds them at deploy time.
  - pkg_type: builtin.hdf5
    pkg_name: hdf5
    parallel: true
  - pkg_type: builtin.adios2
    pkg_name: adios2
    use_hdf5: true
    use_mpi: true
    use_fortran: false
    use_python: false
  - pkg_type: builtin.ior
    pkg_name: ior_apptainer
    nprocs: 4
    ppn: 4
    block: 1G
    xfer: 1M
    api: posix
    out: /tmp/ior_test_file
    log: /tmp/ior_output.log
    write: true
    read: true
    fpp: false
    reps: 1
    direct: false
