# Pipeline: LAMMPS Container Test
# Purpose: Test LAMMPS Kokkos CUDA deployment using Docker/Podman/Apptainer
# Requirements: NVIDIA GPU, Docker/Podman with NVIDIA Container Toolkit
# Base image: sci-hpc-base (build from awesome-scienctific-applications/base/)

name: lammps_container_test

container_engine: docker
container_base: sci-hpc-base

pkgs:
  - pkg_type: builtin.lammps
    pkg_name: lammps_container
    deploy_mode: container
    nprocs: 4
    ppn: 4
    cuda_arch: 80
    base_image: sci-hpc-base
    kokkos_gpu: true
    num_gpus: 1
    # Run LJ benchmark from container
    script: /opt/lammps/bench/in.lj
    out: /tmp/lammps_out
