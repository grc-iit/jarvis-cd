# Pipeline: BioExcel Building Blocks MD Setup Apptainer Test
# Purpose: Test biobb_wf_md_setup workflow using Apptainer (rootless, HPC-friendly)
# Requirements: Docker (for build phase) + Apptainer (for runtime)

name: biobb_wf_md_setup_apptainer_test
base_deploy_mode: container

container_engine: apptainer
container_base: ubuntu:24.04

pkgs:
  - pkg_type: builtin.biobb_wf_md_setup
    pkg_name: biobb_wf_md_setup_apptainer
    nprocs: 1
    ppn: 1
    out: $HOME/jarvis-runs/biobb_wf_md_setup
