# Pipeline: Gray-Scott ParaView Container Test
# Purpose: Test Gray-Scott with ParaView visualization using Docker
# Requirements: Docker installed, sci-hpc-base image built locally

name: gray_scott_paraview_container_test
install_manager: container

container_engine: docker
container_base: sci-hpc-base

pkgs:
  - pkg_type: builtin.gray_scott_paraview
    pkg_name: gray_scott_paraview_container
    nprocs: 2
    ppn: 2
    out: /tmp/gray_scott_paraview_out
