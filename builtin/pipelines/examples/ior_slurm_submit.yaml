# Pipeline: IOR submitted as a SLURM job
# Purpose: Demonstrates the `scheduler:` key. The submission script
# generated by `jarvis ppl submit` builds the hostfile from
# $SLURM_JOB_NODELIST and then runs this pipeline inside the allocation.
#
# Usage:
#   jarvis ppl submit builtin/pipelines/examples/ior_slurm_submit.yaml
#   # or, after loading:
#   jarvis ppl load yaml builtin/pipelines/examples/ior_slurm_submit.yaml
#   jarvis ppl submit
#
# To inspect the generated script without submitting:
#   jarvis ppl submit builtin/pipelines/examples/ior_slurm_submit.yaml +no_submit

name: ior_slurm_submit

scheduler:
  name: slurm
  # The hostfile path defaults to ${SHARED_DIR}/hostfile.txt — listed
  # here for clarity. The job script populates this file from
  # $SLURM_JOB_NODELIST and every package in the pipeline reads from it.
  # hostfile: ${SHARED_DIR}/hostfile.txt
  job_name: ior_slurm_submit
  nodes: 2
  ntasks_per_node: 4
  partition: cpu
  time: "00:30:00"
  output: slurm-%j.out
  error: slurm-%j.err
  # Any additional sbatch flags can be passed via sbatch_args, e.g.:
  # sbatch_args:
  #   - "--constraint=scratch"

pkgs:
  - pkg_type: builtin.ior
    pkg_name: ior_slurm
    nprocs: 8           # nodes * ntasks_per_node
    ppn: 4
    block: 1G
    xfer: 1M
    api: posix
    out: ${HOME}/ior_slurm_submit.bin
    write: true
    read: true
