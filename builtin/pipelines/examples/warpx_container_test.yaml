# Pipeline: WarpX Container Test
# Purpose: Test WarpX PIC simulation using Docker/Podman/Apptainer
# Requirements: NVIDIA GPU, sci-hpc-base image

name: warpx_container_test
install_manager: container

container_engine: docker
container_base: sci-hpc-base

pkgs:
  - pkg_type: builtin.warpx
    pkg_name: warpx_container
    nprocs: 2
    ppn: 2
    cuda_arch: 80
    base_image: sci-hpc-base
    example: laser_acceleration
    max_step: 50
    n_cell: 64 64 128
    out: /tmp/warpx_out
    plot_int: 10
