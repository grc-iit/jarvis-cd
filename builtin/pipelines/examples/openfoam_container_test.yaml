# Pipeline: OpenFOAM Container Test
# Purpose: Test OpenFOAM-dev deployment using Docker, driving the bundled
#          lid-driven cavity tutorial end-to-end via ./Allrun inside the
#          deploy container.
# Requirements: Docker installed, sci-hpc-base image built locally
#
# OpenFOAM-dev has no native ADIOS2 integration. ADIOS2 is installed by the
# adios2 Library package for coupled workflows / in-situ analysis.
# use_fortran/use_python are off because openfoam-dev links ADIOS2 at the
# C++ level only.

name: openfoam_container_test
install_manager: container

container_engine: docker
container_base: sci-hpc-base

pkgs:
  - pkg_type: builtin.adios2
    pkg_name: adios2
    version: v2.10.2
    use_hdf5: true
    use_mpi: true
    use_fortran: false
    use_python: false
  - pkg_type: builtin.openfoam
    pkg_name: openfoam_container
    nprocs: 1
    ppn: 1
    script_location: /opt/OpenFOAM/OpenFOAM-dev/tutorials/incompressibleFluid/cavity
    script: ./Allrun
