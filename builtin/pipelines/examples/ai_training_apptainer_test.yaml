# Pipeline: AI Training Apptainer Test
# Purpose: Test PyTorch distributed training using Apptainer
# Requirements: NVIDIA GPU, sci-hpc-base image built locally

name: ai_training_apptainer_test
install_manager: container

container_engine: apptainer
container_base: sci-hpc-base

pkgs:
  - pkg_type: builtin.ai_training
    pkg_name: ai_training_apptainer
    base_image: sci-hpc-base
    script: /opt/train_example.py
    epochs: 3
    batch: 128
    nnodes: 1
    nproc_per_node: 1
    master_addr: localhost
    master_port: 29500
    out: /tmp/ai_training_out
