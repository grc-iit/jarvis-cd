# Pipeline: IOR Spack Test
# Purpose: Test IOR deployment using spack package manager
# Requirements: Spack installed and in PATH (or SPACK_ROOT set)

name: ior_spack_test
base_deploy_mode: spack

pkgs:
  - pkg_type: builtin.ior
    pkg_name: ior_spack
    install_method: spack
    install_query: ior
    nprocs: 2
    ppn: 2
    block: 32m
    xfer: 1m
    api: posix
    out: /tmp/ior_spack_test.bin
    write: true
    read: true
    fpp: false
    reps: 1
    direct: false
