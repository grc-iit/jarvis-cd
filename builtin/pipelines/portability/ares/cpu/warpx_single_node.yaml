# Pipeline: WarpX single-node on Ares CPU
# builtin.hdf5 provides parallel HDF5 at /usr/local; warpx is built
# with -DWarpX_COMPUTE=NOACC when base_image lacks 'sci-hpc'.

name: warpx_ares_single_node
install_manager: container

container_engine: docker
container_base: ubuntu:24.04

hostfile: /home/imuradli/hostfile_single.txt

container_env:
  OMPI_MCA_btl_tcp_if_include: eno1
  OMPI_MCA_oob_tcp_if_include: eno1

pkgs:
  - pkg_type: builtin.hdf5
    pkg_name: hdf5
  - pkg_type: builtin.warpx
    pkg_name: warpx_ares_single
    nprocs: 4
    ppn: 4
    base_image: ubuntu:24.04
    example: laser_acceleration
    max_step: 10
    n_cell: 32 32 64
    out: /tmp/warpx_ares_out
    plot_int: 5
