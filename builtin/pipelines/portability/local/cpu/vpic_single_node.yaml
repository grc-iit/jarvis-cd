# Pipeline: VPIC single-node on a local workstation (CPU).
# vpic pkg auto-detects CPU mode (ENABLE_KOKKOS_CUDA=OFF) when
# base_image lacks 'sci-hpc'. Uses bundled Kokkos Serial backend.
# No builtin.hdf5 dep — VPIC-Kokkos doesn't use HDF5.
#
# Usage:
#   (optional) export JARVIS_NET_IF=lo   # or your NIC from `ip -br link`
#   bin/jarvis ppl load yaml builtin/pipelines/portability/local/cpu/vpic_single_node.yaml
#   bin/jarvis ppl run
#
# No hostfile needed: jarvis auto-detects a local-only hostfile and
# skips PSSH, so no sshd on :22 is required.

name: vpic_local_single_node
install_manager: container

container_engine: docker
container_base: ubuntu:24.04

container_env:
  OMPI_MCA_btl_tcp_if_include: $JARVIS_NET_IF
  OMPI_MCA_oob_tcp_if_include: $JARVIS_NET_IF

pkgs:
  - pkg_type: builtin.vpic
    pkg_name: vpic_local_single
    nprocs: 4
    ppn: 4
    base_image: ubuntu:24.04
    sample_deck: harris
    run_dir: /tmp/vpic_local_run
