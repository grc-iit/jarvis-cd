# Pipeline: LAMMPS single-node on a local workstation (CPU).
# Uses builtin.hdf5 to provide HDF5 at /usr/local, then builds+runs
# LAMMPS with Kokkos Serial backend (kokkos_gpu:false) on ubuntu:24.04.
#
# Usage:
#   (optional) export JARVIS_NET_IF=lo   # or your NIC from `ip -br link`
#   bin/jarvis ppl load yaml builtin/pipelines/portability/local/cpu/lammps_single_node.yaml
#   bin/jarvis ppl run

name: lammps_local_single_node
install_manager: container

container_engine: docker
container_base: ubuntu:24.04

container_env:
  OMPI_MCA_btl_tcp_if_include: $JARVIS_NET_IF
  OMPI_MCA_oob_tcp_if_include: $JARVIS_NET_IF

pkgs:
  - pkg_type: builtin.hdf5
    pkg_name: hdf5
  - pkg_type: builtin.lammps
    pkg_name: lammps_local_single
    nprocs: 4
    ppn: 4
    base_image: ubuntu:24.04
    kokkos_gpu: false
    script: /opt/lammps/bench/in.lj
    out: /tmp/lammps_local_out
