title: "DeepDriveMD-container-smoke"
resource: local.localhost
queue: ""
schema_: local
project: ""
walltime_min: 30
max_iteration: __MAX_ITER__
cpus_per_node: 4
gpus_per_node: 1
hardware_threads_per_cpu: 1
experiment_directory: __EXPERIMENT_DIR__
node_local_path: null
molecular_dynamics_stage:
    pre_exec: []
    executable: /bin/echo
    arguments:
    - "MD_TASK_PLACEHOLDER"
    cpu_reqs:
        processes: 1
        process_type: null
        threads_per_process: 1
        thread_type: null
    gpu_reqs:
        processes: 0
        process_type: null
        threads_per_process: 0
        thread_type: null
    num_tasks: __NUM_TASKS__
    task_config:
        initial_pdb_dir: /opt/ddmd-bench
aggregation_stage:
    pre_exec: []
    executable: /bin/echo
    arguments:
    - "AGGREGATION_TASK_PLACEHOLDER"
    cpu_reqs:
        processes: 1
        process_type: null
        threads_per_process: 1
        thread_type: null
    gpu_reqs:
        processes: 0
        process_type: null
        threads_per_process: 0
        thread_type: null
    skip_aggregation: true
    task_config: {}
machine_learning_stage:
    pre_exec: []
    executable: /bin/echo
    arguments:
    - "ML_TASK_PLACEHOLDER"
    cpu_reqs:
        processes: 1
        process_type: null
        threads_per_process: 1
        thread_type: null
    gpu_reqs:
        processes: 0
        process_type: null
        threads_per_process: 0
        thread_type: null
    retrain_freq: 1
    task_config: {}
model_selection_stage:
    pre_exec: []
    executable: /bin/echo
    arguments:
    - "MODEL_SELECTION_TASK_PLACEHOLDER"
    cpu_reqs:
        processes: 1
        process_type: null
        threads_per_process: 1
        thread_type: null
    gpu_reqs:
        processes: 0
        process_type: null
        threads_per_process: 0
        thread_type: null
    task_config: {}
agent_stage:
    pre_exec: []
    executable: /bin/echo
    arguments:
    - "AGENT_TASK_PLACEHOLDER"
    cpu_reqs:
        processes: 1
        process_type: null
        threads_per_process: 1
        thread_type: null
    gpu_reqs:
        processes: 0
        process_type: null
        threads_per_process: 0
        thread_type: null
    task_config: {}
